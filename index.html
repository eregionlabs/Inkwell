<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>InkBlot</title>
  <link rel="stylesheet" href="styles/app.css">
  <link rel="stylesheet" href="styles/preview.css">
  <link rel="stylesheet" href="styles/paywall.css">
</head>
<body>
  <div class="toolbar">
    <button id="btn-new" title="New File (Cmd+N)">New</button>
    <button id="btn-open" title="Open File (Cmd+O)">Open</button>
    <button id="btn-open-folder" title="Open Folder (Cmd+Shift+O)">Folder</button>
    <button id="btn-save" title="Save (Cmd+S)">Save</button>
    <button id="btn-export" title="Export PDF (Cmd+P)">Export PDF</button>
    <div class="toolbar-separator"></div>
    <button id="btn-preview-fullscreen" title="Focus Preview (Cmd+Shift+P)">Focus</button>
    <span class="toolbar-spacer"></span>
    <span id="filename" class="filename">Untitled</span>
    <span id="modified-indicator" class="modified-indicator"></span>
  </div>
  <div class="find-bar" id="find-bar" style="display: none;">
    <input type="text" id="find-input" placeholder="Find..." autocomplete="off" spellcheck="false">
    <span id="find-count" class="find-count"></span>
    <button id="find-prev" class="find-btn" title="Previous (Shift+Enter)">&lsaquo;</button>
    <button id="find-next" class="find-btn" title="Next (Enter)">&rsaquo;</button>
    <button id="find-close" class="find-btn find-close" title="Close (Esc)">&times;</button>
  </div>
  <div class="main">
    <div class="sidebar" id="sidebar" style="display: none;">
      <div class="sidebar-header">
        <span class="sidebar-title" id="sidebar-title">Folder</span>
        <button class="sidebar-close" id="sidebar-close" title="Close sidebar">&times;</button>
      </div>
      <div class="sidebar-files" id="sidebar-files"></div>
    </div>
    <div class="sidebar-divider" id="sidebar-divider" style="display: none;"></div>
    <div class="editor-pane">
      <textarea id="editor" spellcheck="false" placeholder="Start writing markdown..."></textarea>
    </div>
    <div class="divider"></div>
    <div class="preview-pane">
      <div id="preview" class="preview-content"></div>
    </div>
  </div>
  <!-- Paywall overlay -->
  <div id="paywall" class="paywall-overlay" style="display: none;">
    <div class="paywall-card">
      <div class="paywall-icon">&#9997;&#65039;</div>
      <h2>Your free trial has ended</h2>
      <p>Unlock InkBlot forever for just <strong>$4.99</strong></p>
      <p class="paywall-features">Beautiful markdown editing with pixel-perfect PDF export</p>
      <button id="btn-purchase" class="paywall-btn">Unlock InkBlot — $4.99</button>
      <button id="btn-restore" class="paywall-btn-secondary">Restore Purchase</button>
      <p class="paywall-legal"><a href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/" target="_blank">Terms of Use (EULA)</a> · <a href="https://eregionlabs.com/privacy-policy" target="_blank">Privacy Policy</a></p>
    </div>
  </div>

  <script src="node_modules/markdown-it/dist/markdown-it.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
